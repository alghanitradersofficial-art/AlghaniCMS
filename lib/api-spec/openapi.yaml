  /reports/profit-loss:
    get:
      operationId: getProfitLossReport
      tags: [reports]
      summary: Get profit and loss report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly, yearly]
            default: monthly
      responses:
        "200":
          description: Profit/loss report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitLossReport"

  /reports/inventory:
    get:
      operationId: getInventoryReport
      tags: [reports]
      summary: Get inventory valuation report
      responses:
        "200":
          description: Inventory report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      required: [totalSales, totalPurchases, totalExpenses, grossProfit, netProfit, totalProducts, totalCustomers, pendingOrders, lowStockCount, todaySales, weeklySales, monthlySales, totalRevenue]
      properties:
        totalSales:
          type: number
        totalPurchases:
          type: number
        totalExpenses:
          type: number
        grossProfit:
          type: number
        netProfit:
          type: number
        totalProducts:
          type: integer
        totalCustomers:
          type: integer
        pendingOrders:
          type: integer
        lowStockCount:
          type: integer
        todaySales:
          type: number
        weeklySales:
          type: number
        monthlySales:
          type: number
        totalRevenue:
          type: number

    ChartDataPoint:
      type: object
      required: [label, sales, purchases, profit]
      properties:
        label:
          type: string
        sales:
          type: number
        purchases:
          type: number
        profit:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, amount, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [sale, purchase, expense, product, customer]
        description:
          type: string
        amount:
          type: ["number", "null"]
        createdAt:
          type: string

    TopProduct:
      type: object
      required: [id, name, sku, totalSold, revenue]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        totalSold:
          type: integer
        revenue:
          type: number

    LowStockAlert:
      type: object
      required: [id, name, sku, currentStock, minStock]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        currentStock:
          type: integer
        minStock:
          type: integer

    Product:
      type: object
      required: [id, name, sku, description, categoryId, brandId, costPrice, salePrice, currentStock, minStock, unit, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        description:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        brandId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        brandName:
          type: ["string", "null"]
        costPrice:
          type: number
        salePrice:
          type: number
        currentStock:
          type: integer
        minStock:
          type: integer
        unit:
          type: string
        oemNumber:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        createdAt:
          type: string

    ProductList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductInput:
      type: object
      required: [name, sku, costPrice, salePrice, currentStock, minStock, unit]
      properties:
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        brandId:
          type: ["integer", "null"]
        costPrice:
          type: number
        salePrice:
          type: number
        currentStock:
          type: integer
        minStock:
          type: integer
        unit:
          type: string
        oemNumber:
          type: string
        barcode:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        brandId:
          type: ["integer", "null"]
        costPrice:
          type: number
        salePrice:
          type: number
        currentStock:
          type: integer
        minStock:
          type: integer
        unit:
          type: string
        oemNumber:
          type: string
        barcode:
          type: string

    Category:
      type: object
      required: [id, name, productCount]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        productCount:
          type: integer

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    Brand:
      type: object
      required: [id, name, productCount]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        productCount:
          type: integer

    BrandInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    BrandUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    SaleItem:
      type: object
      required: [productId, productName, quantity, unitPrice, total]
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        total:
          type: number

    Sale:
      type: object
