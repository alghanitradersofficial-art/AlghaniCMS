name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Run typecheck & build
        run: pnpm run build
      - name: Run migrations (if DATABASE_URL provided)
        if: env.DATABASE_URL != ''
        run: pnpm run migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Run tests (skip if none)
        run: |
          if [ -f ./package.json ] ; then pnpm -s test || true ; fi
      - name: Trigger Vercel Deploy (optional)
        if: env.VERCEL_TOKEN != ''
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: --prod
          working-directory: .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
